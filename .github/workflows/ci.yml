name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — lint · typecheck · tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: helpdesk
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: helpdesk
        ports: ["5436:5432"]
        options: >-
          --health-cmd "pg_isready -U helpdesk"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://helpdesk:testpassword@localhost:5436/helpdesk
      SECURITY_DB_HOST: localhost
      SECURITY_DB_PORT: "5436"
      SECURITY_DB_USER: helpdesk
      SECURITY_DB_PASSWORD: testpassword
      SECURITY_DB_NAME: helpdesk
      # urlsafe_b64 of exactly 32 bytes → valid Fernet key derivation
      SECRET_KEY: Y2ktc2VjcmV0LWtleS1mb3ItY2ktZW52aXJvbm1lbnQ=
      ENV: development
      OPENAI_API_KEY: sk-test-key-not-used-mocked-by-respx

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Format check (ruff)
        run: ruff format --check app/ tests/

      - name: Typecheck (mypy)
        run: mypy --config-file pyproject.toml app/services app/core

      - name: Apply security stub + migration
        run: |
          pip install psycopg2-binary
          PGPASSWORD=testpassword psql -h localhost -p 5436 -U helpdesk helpdesk \
            -f ../scripts/dev_security_stub.sql
          DATABASE_URL=postgresql+psycopg2://helpdesk:testpassword@localhost:5436/helpdesk \
            alembic upgrade head

      - name: Unit tests + coverage
        run: pytest tests/unit/ --cov=app --cov-report=term-missing -q

      - name: Prompt injection suite (mock — blocks merge on failure)
        run: pytest -m prompt_injection --tb=short -q

  frontend:
    name: Frontend — lint · typecheck · tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install
        run: pnpm install --frozen-lockfile 2>/dev/null || pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test
